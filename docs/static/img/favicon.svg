<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Simplified Green T-Rex Head for Favicon -->
  <path d="M20 40 
           C 20 10, 70 5, 90 20 
           L 95 50 
           C 95 65, 80 75, 50 70 
           L 20 70 Z" 
        fill="#16A34A"/>
  
  <!-- Eye (Regex Asterisk *) -->
  <g transform="translate(45, 30) scale(0.5)">
    <line x1="-10" y1="0" x2="10" y2="0" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="white" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- Simplified Teeth -->
  <path d="M60 70 L65 62 L70 70" fill="white"/>
  <path d="M75 70 L80 62 L85 70" fill="white"/>
</svg>