<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle (Soft Ghibli Sky Green) -->
  <circle cx="100" cy="100" r="90" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
  
  <!-- T-Rex Body/Neck -->
  <path d="M60 140 Q80 180 140 140" fill="none" stroke="#16A34A" stroke-width="12" stroke-linecap="round"/>
  
  <!-- T-Rex Head -->
  <path d="M50 80 
           C 50 40, 110 30, 150 50 
           L 160 90 
           C 160 110, 140 120, 100 110 
           L 50 110 Z" 
        fill="#16A34A"/>
  
  <!-- Eye (Regex Asterisk *) -->
  <g transform="translate(85, 65) scale(0.8)">
    <line x1="-10" y1="0" x2="10" y2="0" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Teeth (Regex Caret ^) -->
  <path d="M110 110 L115 100 L120 110" fill="white"/>
  <path d="M125 110 L130 100 L135 110" fill="white"/>
  
  <!-- Text: Ts-Rex -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#16A34A" text-anchor="middle">Ts-Rex</text>
  
  <!-- Decorative Regex Symbols -->
  <text x="160" y="40" font-family="monospace" font-size="20" fill="#4ADE80" opacity="0.6">.+</text>
  <text x="30" y="130" font-family="monospace" font-size="20" fill="#4ADE80" opacity="0.6">()</text>
</svg>